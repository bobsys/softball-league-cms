<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Roster | Irondequoit Senior Softball</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        // Standard Dark Mode Prevention Script
        tailwind.config = { darkMode: 'class' }
        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark')
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        /* Hide scrollbar for Chrome/Safari */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        /* Hide scrollbar for IE/Edge/Firefox */
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">

    <div id="header-wrap"></div>

    <div class="flex flex-1">
        <!-- SIDEBAR (Consistent with Admin Style) -->
        <aside class="w-64 bg-slate-100 dark:bg-slate-900 text-slate-600 dark:text-slate-400 flex flex-col h-[calc(100vh-60px)] sticky top-[60px] border-r border-slate-200 dark:border-slate-800 hidden lg:flex">
            <nav class="p-4 space-y-1 text-sm overflow-y-auto no-scrollbar">
                <div class="text-[10px] uppercase tracking-[.2em] text-slate-600 font-black px-3 mb-4 mt-2">League Directory</div>
                <div id="sidebar-teams" class="space-y-1">
                    <!-- Team links will be injected here by app.js -->
                    <p class="px-3 text-xs italic text-slate-600">Loading directory...</p>
                </div>
            </nav>
            <div class="mt-auto p-6 border-t border-slate-800">
                <a href="index.html" class="flex items-center gap-2 text-xs font-bold hover:text-white transition">
                    <i data-lucide="arrow-left" class="w-4 h-4"></i> Back to Home
                </a>
            </div>
        </aside>

        <!-- MAIN ROSTER CONTENT -->
        <main class="flex-1 p-6 lg:p-12 overflow-y-auto">
            <!-- Breadcrumbs for Mobile -->
            <div class="lg:hidden mb-6">
                <a href="index.html" class="text-xs font-bold text-blue-600 flex items-center gap-1">
                    <i data-lucide="chevron-left" class="w-3 h-3"></i> League Directory
                </a>
            </div>

            <!-- Team Header (Name and Coach) -->
            <div id="team-header" class="mb-10">
                <div class="h-12 w-48 bg-slate-200 dark:bg-slate-800 animate-pulse rounded-xl"></div>
            </div>
            
            <!-- Roster Table Container -->
            <div class="bg-white dark:bg-slate-900 rounded-3xl border border-slate-200 dark:border-slate-800 shadow-xl shadow-slate-200/50 dark:shadow-none overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <!-- Find the <thead> in team-details.html and update it -->
                        <thead class="bg-slate-50 dark:bg-slate-800/50 border-b border-slate-200 dark:border-slate-800">
                            <tr class="text-[10px] font-black uppercase tracking-widest text-slate-400">
                                <th class="p-5">Player Name</th>
                                <th class="p-5 text-center">Position</th>
                                <th class="p-5 text-center">Age</th>
                                <th class="p-5 text-center">Phone</th> <!-- NEW COLUMN -->
                            </tr>
                        </thead>
                        <tbody id="roster-list" class="divide-y divide-slate-100 dark:divide-slate-800">
                            <!-- Players will be injected here by app.js -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- SCRIPTS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
    <script>
        // Re-initialize Lucide Icons
        window.addEventListener('load', () => {
            lucide.createIcons();
        });
    </script>
</body>
</html>
