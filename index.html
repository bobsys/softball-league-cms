<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Irondequoit Senior Softball</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else { document.documentElement.classList.remove('dark') }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100">

    <!-- UNIVERSAL HEADER -->
    <nav class="sticky top-0 z-50 bg-white/90 dark:bg-slate-900/90 backdrop-blur-md border-b border-slate-200 dark:border-slate-800 py-2">
        <div class="max-w-7xl mx-auto px-4 flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-3 group">
                <img src="https://gwcfzujfyzusyuaazslx.supabase.co/storage/v1/object/public/league-documents/McAvoy%20Logo.png" alt="ISS Logo" class="w-12 h-12 rounded-full border-2 border-blue-600 group-hover:scale-105 transition">
                <div>
                    <span class="font-black text-xl tracking-tighter block leading-none dark:text-white">IRONDEQUOIT</span>
                    <span class="text-[10px] font-bold text-blue-600 dark:text-blue-400 uppercase tracking-[.2em]">Senior Softball</span>
                </div>
            </a>
            <div class="flex items-center gap-4">
                <button id="theme-toggle" class="p-2 rounded-full bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 hover:ring-2 ring-blue-500 transition">
                    <i data-lucide="sun" class="w-4 h-4 hidden dark:block"></i>
                    <i data-lucide="moon" class="w-4 h-4 dark:hidden"></i>
                </button>
                <a href="admin.html" class="bg-slate-900 dark:bg-blue-600 text-white px-5 py-2 rounded-full text-xs font-bold uppercase tracking-widest hover:opacity-90 transition">Admin</a>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-12">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-12">
            <!-- Left Column: Teams -->
            <div class="lg:col-span-2">
                <h2 class="text-2xl font-black mb-8 flex items-center gap-3"><i data-lucide="shield" class="text-blue-600"></i> League Teams</h2>
                <div id="teams-list" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <!-- Team blocks will link to team-details.html?id=... -->
                </div>
            </div>

            <!-- Right Column: Documents -->
            <div>
                <h2 class="text-2xl font-black mb-8 flex items-center gap-3"><i data-lucide="file-text" class="text-orange-500"></i> Resources</h2>
                <div id="docs-list" class="space-y-6">
                    <!-- Groups will be injected here -->
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
    <script>
        lucide.createIcons();
        document.getElementById('theme-toggle').addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('color-theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
        });
    </script>
</body>
</html>
