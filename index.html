<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Softball CMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark')
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 flex min-h-screen">

    <!-- Sidebar -->
    <aside class="w-64 bg-slate-900 text-slate-300 flex flex-col sticky top-0 h-screen">
        <div class="p-6 border-b border-slate-800">
            <a href="index.html" class="flex items-center gap-3 text-white group">
                <div class="bg-blue-600 p-1.5 rounded-lg group-hover:bg-blue-500 transition">
                    <i data-lucide="home" class="w-5 h-5"></i>
                </div>
                <span class="font-bold">Go to Site</span>
            </a>
        </div>
        <nav class="flex-1 p-4 space-y-2 text-sm">
            <div class="text-[10px] uppercase tracking-widest text-slate-500 font-bold px-3 mb-2">Management</div>
            <a href="#" class="flex items-center gap-3 p-3 bg-slate-800 text-white rounded-xl">
                <i data-lucide="layout-dashboard" class="w-4 h-4"></i> Dashboard
            </a>
            <a href="#" class="flex items-center gap-3 p-3 hover:bg-slate-800 transition rounded-xl">
                <i data-lucide="users" class="w-4 h-4"></i> Teams
            </a>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 p-10">
        <header class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-2xl font-bold">Admin CMS</h1>
                <p class="text-slate-500 dark:text-slate-400 text-sm">League persistence management</p>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <!-- Add Team -->
            <div class="bg-white dark:bg-slate-900 p-6 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-sm">
                <h2 class="font-bold mb-4 text-sm flex items-center gap-2"><i data-lucide="plus" class="w-4 h-4 text-blue-500"></i> New Team</h2>
                <form id="team-form" class="space-y-4">
                    <input type="text" id="team-name" placeholder="Team Name" class="w-full text-sm p-3 bg-slate-50 dark:bg-slate-800 border-none rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                    <input type="text" id="coach-name" placeholder="Coach Name" class="w-full text-sm p-3 bg-slate-50 dark:bg-slate-800 border-none rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                    <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold text-sm hover:bg-blue-700 transition">Save Team</button>
                </form>
            </div>

            <!-- Add Player -->
            <div class="bg-white dark:bg-slate-900 p-6 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-sm">
                <h2 class="font-bold mb-4 text-sm flex items-center gap-2"><i data-lucide="user-plus" class="w-4 h-4 text-emerald-500"></i> New Player</h2>
                <form id="player-form" class="space-y-4">
                    <select id="team-select" class="w-full text-sm p-3 bg-slate-50 dark:bg-slate-800 border-none rounded-xl outline-none"><option value="">Select Team...</option></select>
                    <input type="text" id="player-name" placeholder="Name" class="w-full text-sm p-3 bg-slate-50 dark:bg-slate-800 border-none rounded-xl outline-none">
                    <div class="grid grid-cols-2 gap-2">
                        <input type="number" id="player-age" placeholder="Age" class="text-sm p-3 bg-slate-50 dark:bg-slate-800 border-none rounded-xl outline-none">
                        <input type="text" id="player-pos" placeholder="Position" class="text-sm p-3 bg-slate-50 dark:bg-slate-800 border-none rounded-xl outline-none">
                    </div>
                    <input type="tel" id="player-phone" placeholder="Phone" class="w-full text-sm p-3 bg-slate-50 dark:bg-slate-800 border-none rounded-xl outline-none">
                    <button type="submit" class="w-full bg-slate-800 dark:bg-slate-700 text-white py-3 rounded-xl font-bold text-sm hover:opacity-90 transition">Add to Roster</button>
                </form>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
