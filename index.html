<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Irondequoit Senior Softball</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else { document.documentElement.classList.remove('dark') }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100">

    <div id="header-wrap"></div>  
      
    <!-- Announcements Section in index.html -->
    <section id="announcements-section" class="mb-12">
        <h2 class="text-2xl font-black mb-8 flex items-center gap-3"><i data-lucide="megaphone" class="text-red-500"></i> League News</h2>
        <div id="announcements-list" class="space-y-4">
            <!-- Announcements (Blog posts) injected here -->
        </div>
    </section>

    <main class="max-w-7xl mx-auto px-4 py-12">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-12">
            <!-- Left Column: Teams -->
            <div class="lg:col-span-2">
                <h2 class="text-2xl font-black mb-8 flex items-center gap-3"><i data-lucide="shield" class="text-blue-600"></i> League Teams</h2>
                <div id="teams-list" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <!-- Team blocks will link to team-details.html?id=... -->
                </div>
            </div>

            <!-- Right Column: Documents -->
            <div>
                <h2 class="text-2xl font-black mb-8 flex items-center gap-3"><i data-lucide="file-text" class="text-orange-500"></i> Resources</h2>
                <div id="docs-list" class="space-y-6">
                    <!-- Groups will be injected here -->
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
    <script>
        lucide.createIcons();
        document.getElementById('theme-toggle').addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('color-theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
        });
    </script>
</body>
</html>
