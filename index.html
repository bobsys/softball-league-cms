<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Softball League | Community Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else { document.documentElement.classList.remove('dark') }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 transition-colors duration-200">
    <!-- TOP NAVIGATION (NO SIDEBAR HERE) -->
    <nav class="sticky top-0 z-50 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800 py-3">
        <div class="max-w-6xl mx-auto px-4 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="bg-blue-600 p-1.5 rounded-lg text-white">
                    <i data-lucide="trophy" class="w-5 h-5"></i>
                </div>
                <span class="font-bold tracking-tight text-lg">SoftballCentral</span>
            </div>
            <div class="flex items-center gap-6 text-sm font-medium">
                <a href="index.html" class="text-blue-600">Home</a>
                <button id="theme-toggle" class="p-2 rounded-lg bg-slate-100 dark:bg-slate-800"><i data-lucide="moon" class="w-4 h-4 dark:hidden"></i><i data-lucide="sun" class="w-4 h-4 hidden dark:block"></i></button>
                <a href="admin.html" class="bg-slate-800 dark:bg-blue-600 text-white px-4 py-1.5 rounded-full hover:opacity-90">Admin Portal</a>
            </div>
        </div>
    </nav>

    <header class="max-w-6xl mx-auto px-4 py-12 text-center lg:text-left">
        <h1 class="text-4xl font-extrabold tracking-tight">League Dashboard</h1>
        <p class="text-slate-500 dark:text-slate-400 mt-2 text-sm">Welcome to the official 2025 League site.</p>
    </header>

    <main class="max-w-6xl mx-auto px-4 pb-20">
        <section id="teams" class="mb-12">
            <h2 class="text-xl font-bold mb-6 flex items-center gap-2">
                <i data-lucide="shield" class="w-5 h-5 text-blue-600"></i> Active Teams
            </h2>
            <div id="teams-list" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                <!-- Teams from DB will show here -->
                <p class="text-slate-400 text-sm">Connecting to database...</p>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
    <script>
        lucide.createIcons();
        document.getElementById('theme-toggle').addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('color-theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
        });
    </script>
</body>
</html>
