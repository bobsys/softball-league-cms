<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Softball CMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else { document.documentElement.classList.remove('dark') }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 flex min-h-screen">

    <!-- Sidebar -->
    <aside class="w-64 bg-slate-900 text-slate-300 flex flex-col sticky top-0 h-screen">
        <div class="p-6 border-b border-slate-800">
            <!-- CRITICAL: FIXED HOME LINK -->
            <a href="index.html" class="flex items-center gap-3 text-white group">
                <div class="bg-blue-600 p-1.5 rounded-lg group-hover:bg-blue-500 transition">
                    <i data-lucide="home" class="w-5 h-5"></i>
                </div>
                <span class="font-bold">Public Home</span>
            </a>
        </div>
        <nav class="flex-1 p-4 space-y-2 text-sm">
            <a href="admin.html" class="flex items-center gap-3 p-3 bg-slate-800 text-white rounded-xl">
                <i data-lucide="layout-dashboard" class="w-4 h-4"></i> Management
            </a>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 p-10 overflow-y-auto">
        <header class="mb-10">
            <h1 class="text-2xl font-bold">League Management</h1>
            <p class="text-slate-500 dark:text-slate-400 text-sm">Edit, delete, and verify league data.</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-12">
            <!-- Add Team -->
            <div class="bg-white dark:bg-slate-900 p-6 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-sm">
                <h2 class="font-bold mb-4 text-sm flex items-center gap-2"><i data-lucide="plus" class="w-4 h-4 text-blue-500"></i> Create Team</h2>
                <form id="team-form" class="space-y-4">
                    <input type="text" id="team-name" placeholder="Team Name" class="w-full text-sm p-3 bg-slate-50 dark:bg-slate-800 border-none rounded-xl outline-none" required>
                    <input type="text" id="coach-name" placeholder="Coach Name" class="w-full text-sm p-3 bg-slate-50 dark:bg-slate-800 border-none rounded-xl outline-none">
                    <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold text-sm hover:bg-blue-700 transition">Save Team</button>
                </form>
            </div>

            <!-- Add Player -->
            <div class="bg-white dark:bg-slate-900 p-6 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-sm">
                <h2 class="font-bold mb-4 text-sm flex items-center gap-2"><i data-lucide="user-plus" class="w-4 h-4 text-emerald-500"></i> Add Player</h2>
                <form id="player-form" class="space-y-4">
                    <select id="team-select" class="w-full text-sm p-3 bg-slate-50 dark:bg-slate-800 border-none rounded-xl outline-none" required><option value="">Select Team...</option></select>
                    <input type="text" id="player-name" placeholder="Full Name" class="w-full text-sm p-3 bg-slate-50 dark:bg-slate-800 border-none rounded-xl outline-none" required>
                    <div class="grid grid-cols-2 gap-2">
                        <input type="number" id="player-age" placeholder="Age" class="text-sm p-3 bg-slate-50 dark:bg-slate-800 border-none rounded-xl outline-none">
                        <input type="text" id="player-pos" placeholder="Position" class="text-sm p-3 bg-slate-50 dark:bg-slate-800 border-none rounded-xl outline-none">
                    </div>
                    <button type="submit" class="w-full bg-slate-800 dark:bg-slate-700 text-white py-3 rounded-xl font-bold text-sm hover:opacity-90 transition">Add Player</button>
                </form>
            </div>
            
            <!-- Upload Document Card -->
            <div class="bg-white dark:bg-slate-900 p-6 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-sm">
                <h2 class="font-bold mb-4 text-sm flex items-center gap-2">
                    <i data-lucide="file-up" class="w-4 h-4 text-orange-500"></i> Upload Document
                </h2>
                <form id="doc-form" class="space-y-4">
                    <input type="text" id="doc-title" placeholder="Document Title (e.g. 2025 Rules)" class="w-full text-sm p-3 bg-slate-50 dark:bg-slate-800 border-none rounded-xl outline-none" required>
                    <input type="text" id="doc-category" placeholder="Group (e.g. 2025 Rules)" class="w-full text-sm p-3 bg-slate-50 dark:bg-slate-800 border-none rounded-xl outline-none">
                    <input type="file" id="doc-file" class="text-xs text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100" required>
                    <button type="submit" id="upload-btn" class="w-full bg-orange-600 text-white py-3 rounded-xl font-bold text-sm hover:bg-orange-700 transition">Upload File</button>
                </form>
            </div>
        </div>

        <!-- LISTS FOR EDIT/DELETE -->
        <div class="space-y-8">
            <section>
                <h3 class="text-sm font-bold uppercase tracking-widest text-slate-400 mb-4">Existing Teams</h3>
                <div id="admin-teams-list" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <!-- Teams with Edit/Delete buttons appear here -->
                </div>
            </section>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
