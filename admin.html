<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Softball CMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-slate-50 flex">

    <!-- Sidebar -->
    <aside class="w-64 h-screen bg-slate-900 text-slate-300 flex flex-col sticky top-0">
        <div class="p-6 border-b border-slate-800 flex items-center gap-3">
            <div class="bg-blue-500 p-1 rounded-md text-white"><i data-lucide="settings" class="w-5 h-5"></i></div>
            <span class="text-white font-bold tracking-tight">LeagueAdmin</span>
        </div>
        <nav class="flex-1 p-4 space-y-2 text-sm">
            <a href="#" class="flex items-center gap-3 p-3 bg-slate-800 text-white rounded-xl">
                <i data-lucide="layout-dashboard" class="w-4 h-4"></i> Dashboard
            </a>
            <a href="#" class="flex items-center gap-3 p-3 hover:bg-slate-800 hover:text-white rounded-xl transition">
                <i data-lucide="users" class="w-4 h-4"></i> Team Management
            </a>
            <a href="#" class="flex items-center gap-3 p-3 hover:bg-slate-800 hover:text-white rounded-xl transition">
                <i data-lucide="file-text" class="w-4 h-4"></i> Documents
            </a>
            <a href="#" class="flex items-center gap-3 p-3 hover:bg-slate-800 hover:text-white rounded-xl transition">
                <i data-lucide="message-circle" class="w-4 h-4"></i> Forum
            </a>
        </nav>
        <div class="p-4 border-t border-slate-800">
            <a href="index.html" class="flex items-center gap-3 p-3 text-xs hover:text-white">
                <i data-lucide="external-link" class="w-4 h-4"></i> Public Portal
            </a>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 p-10">
        <div class="max-w-4xl">
            <header class="mb-10">
                <h1 class="text-2xl font-bold text-slate-900">League Management</h1>
                <p class="text-slate-500 text-sm">Create and manage teams, rosters, and documents.</p>
            </header>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <!-- Add Team Card -->
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                    <h2 class="font-bold text-slate-800 mb-4 text-sm flex items-center gap-2">
                        <i data-lucide="plus-circle" class="w-4 h-4 text-blue-500"></i> New Team
                    </h2>
                    <form id="team-form" class="space-y-4">
                        <input type="text" id="team-name" placeholder="Team Name" class="w-full text-sm p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                        <input type="text" id="coach-name" placeholder="Coach Name" class="w-full text-sm p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                        <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-xl font-semibold text-sm hover:bg-blue-700 transition">Create Team</button>
                    </form>
                </div>

                <!-- Add Player Card -->
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                    <h2 class="font-bold text-slate-800 mb-4 text-sm flex items-center gap-2">
                        <i data-lucide="user-plus" class="w-4 h-4 text-emerald-500"></i> New Player
                    </h2>
                    <form id="player-form" class="space-y-4">
                        <select id="team-select" class="w-full text-sm p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                            <option value="">Select Team...</option>
                        </select>
                        <input type="text" id="player-name" placeholder="Player Name" class="w-full text-sm p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                        <div class="grid grid-cols-2 gap-2">
                            <input type="number" id="player-age" placeholder="Age" class="text-sm p-3 bg-slate-50 border border-slate-200 rounded-xl">
                            <input type="text" id="player-pos" placeholder="Pos" class="text-sm p-3 bg-slate-50 border border-slate-200 rounded-xl">
                        </div>
                        <input type="tel" id="player-phone" placeholder="Phone Number" class="w-full text-sm p-3 bg-slate-50 border border-slate-200 rounded-xl">
                        <button type="submit" class="w-full bg-slate-800 text-white py-3 rounded-xl font-semibold text-sm hover:bg-slate-900 transition">Add Player</button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
